name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Restore service images cache
        id: service-images-cache
        uses: actions/cache@v4
        with:
          path: /tmp/codette-service-images.tar
          key: ${{ runner.os }}-codette-service-images-${{ hashFiles('infra/docker-compose.yml') }}

      - name: Load cached service images
        if: steps.service-images-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/codette-service-images.tar

      - name: Pull service images
        if: steps.service-images-cache.outputs.cache-hit != 'true'
        run: docker compose --env-file .env -f infra/docker-compose.yml --profile test pull db gcs

      - name: Save service images to cache
        if: steps.service-images-cache.outputs.cache-hit != 'true'
        run: docker save postgres:16 fsouza/fake-gcs-server:latest -o /tmp/codette-service-images.tar

      - name: Restore test image cache
        id: test-image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/codette-test-image.tar
          key: ${{ runner.os }}-codette-test-image-${{ hashFiles('backend/Dockerfile', 'backend/pyproject.toml', 'backend/uv.lock') }}

      - name: Load cached test image
        if: steps.test-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/codette-test-image.tar

      - name: Build test image
        if: steps.test-image-cache.outputs.cache-hit != 'true'
        run: docker compose --env-file .env -f infra/docker-compose.yml --profile test build test

      - name: Save test image to cache
        if: steps.test-image-cache.outputs.cache-hit != 'true'
        run: docker save codette-test:latest -o /tmp/codette-test-image.tar

      - name: Run tests
        run: make test
