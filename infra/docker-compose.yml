name: codette

services:
  db:
    env_file:
      - ../.env
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  gcs:
    image: fsouza/fake-gcs-server
    command: ["-scheme", "http", "-port", "4443"]
    ports:
      - "${GCS_PORT:-4443}:4443"
    volumes:
      - gcs_data:/data

  api:
    build:
      context: ../backend
      target: api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_EMULATOR_HOST: http://gcs:4443
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      target: worker
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      STORAGE_EMULATOR_HOST: http://gcs:4443
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../web
    env_file:
      - ../.env
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

  runner:
    build:
      context: ../images/runner
    profiles:
      - tools

  grader:
    build:
      context: ../images/grader
    profiles:
      - tools

volumes:
  postgres_data:
  gcs_data:
