name: codette

services:
  db:
    env_file:
      - ../.env
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts:/scripts:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER:-codette}\" -d \"$${POSTGRES_DB:-codette}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  gcs:
    image: fsouza/fake-gcs-server
    command: ["-scheme", "http", "-port", "4443"]
    ports:
      - "${GCS_PORT:-4443}:4443"
    volumes:
      - gcs_data:/data

  migrate:
    build:
      context: ../backend
      target: api
    env_file:
      - ../.env
    command:
      [
        "sh",
        "-c",
        "python /app/scripts/dev/wait_for_dependencies.py && alembic upgrade head",
      ]
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      gcs:
        condition: service_started

  api:
    build:
      context: ../backend
      target: api
    env_file:
      - ../.env
    command: ["sh", "/app/scripts/dev/start-api-dev.sh"]
    volumes:
      - ../backend:/app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      # Runtime deps (explicit even though migrate implies them)
      db:
        condition: service_healthy
      gcs:
        condition: service_started
      # Schema must be up-to-date before serving requests
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ../backend
      target: worker
    env_file:
      - ../.env
    command: ["sh", "/app/scripts/dev/start-worker-dev.sh"]
    environment:
      STORAGE_EMULATOR_HOST: http://gcs:4443
    volumes:
      - ../backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      # Runtime deps (explicit even though migrate implies them)
      db:
        condition: service_healthy
      gcs:
        condition: service_started
      # Schema must be up-to-date before polling
      migrate:
        condition: service_completed_successfully

  test:
    build:
      context: ../backend
      target: test
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://codette:codette@db:5432/codette_test
      STORAGE_BUCKET: codette-test
      STORAGE_EMULATOR_HOST: http://gcs:4443
      PYTHONBREAKPOINT: ${PYTHONBREAKPOINT:-IPython.core.debugger.set_trace}
      WAIT_RETRIES: "40"
      WAIT_SLEEP_SECONDS: "1"
    command: ["sh", "/app/scripts/dev/run-tests.sh"]
    volumes:
      - ../backend:/app
      - ../jobs:/jobs
    depends_on:
      db:
        condition: service_healthy
      gcs:
        condition: service_started
    profiles:
      - test

  api-e2e:
    build:
      context: ../backend
      target: api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://codette:codette@db:5432/codette_e2e
      STORAGE_BUCKET: codette-e2e
    command:
      [
        "sh",
        "-c",
        "python /app/scripts/dev/wait_for_dependencies.py && alembic upgrade head && exec uvicorn app.api.main:app --host 0.0.0.0 --port 8000",
      ]
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      gcs:
        condition: service_started
    profiles:
      - e2e

  web-e2e:
    build:
      context: ../web
    environment:
      VITE_PROXY_TARGET: http://api-e2e:8000
    depends_on:
      - api-e2e
    profiles:
      - e2e

  e2e:
    build:
      context: ../e2e
    environment:
      BASE_URL: http://web-e2e:5173
    volumes:
      - ../e2e/results:/app/results
    depends_on:
      - web-e2e
    profiles:
      - e2e

  runner:
    build:
      context: ../jobs
      dockerfile: runner/Dockerfile
    profiles:
      - tools

  grader:
    build:
      context: ../jobs
      dockerfile: grader/Dockerfile
    profiles:
      - tools

volumes:
  postgres_data:
  gcs_data:
