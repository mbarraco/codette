name: codette

services:
  db:
    env_file:
      - ../.env
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER:-codette}\" -d \"$${POSTGRES_DB:-codette}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  gcs:
    image: fsouza/fake-gcs-server
    command: ["-scheme", "http", "-port", "4443"]
    ports:
      - "${GCS_PORT:-4443}:4443"
    volumes:
      - gcs_data:/data

  api:
    build:
      context: ../backend
      target: api
    env_file:
      - ../.env
    command: ["sh", "/app/scripts/dev/start-api-dev.sh"]
    volumes:
      - ../backend:/app
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      gcs:
        condition: service_started

  worker:
    build:
      context: ../backend
      target: worker
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../web
    env_file:
      - ../.env
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

  test:
    build:
      context: ../backend
      target: test
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://codette:codette@db:5432/codette_test
      STORAGE_BUCKET: codette-test
      STORAGE_EMULATOR_HOST: http://gcs:4443
      PYTHONBREAKPOINT: ${PYTHONBREAKPOINT:-IPython.core.debugger.set_trace}
      WAIT_RETRIES: "40"
      WAIT_SLEEP_SECONDS: "1"
    command: ["sh", "/app/scripts/dev/run-tests.sh"]
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      gcs:
        condition: service_started
    profiles:
      - test

  e2e:
    build:
      context: ../e2e
    environment:
      BASE_URL: http://web:5173
    volumes:
      - ../e2e/results:/app/results
    depends_on:
      - web
    profiles:
      - e2e

  runner:
    build:
      context: ../jobs/runner
    profiles:
      - tools

  grader:
    build:
      context: ../jobs/grader
    profiles:
      - tools

volumes:
  postgres_data:
  gcs_data:
